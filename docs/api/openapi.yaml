openapi: 3.1.0
info:
  title: ARGUS
  description: Document intelligence platform for contractor management and contract
    search.
  version: 0.1.0
paths:
  /assistant/chat:
    post:
      tags:
      - assistant
      summary: Run one unified assistant chat turn
      description: Routes a user message, merges the active brief state and calls
        catalog search when useful. The response keeps assistant prose, router state,
        brief state and found catalog rows as separate layers.
      operationId: assistantChat
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssistantChatRequestIn'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantChatResponseOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /catalog/imports:
    post:
      tags:
      - catalog
      summary: Import catalog CSV
      description: Imports a prices.csv-compatible file as raw import rows plus normalized
        active price_items. Legacy CSV embeddings are preserved only as audit metadata.
      operationId: importCatalogCsv
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_importCatalogCsv'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceImportSummaryOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /catalog/items:
    get:
      tags:
      - catalog
      summary: List active catalog items
      description: Returns active price_items for catalog administration and hydration.
      operationId: listCatalogItems
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceItemListOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /catalog/search:
    post:
      tags:
      - catalog
      summary: Search catalog items
      description: Searches price_items semantically in price_items_search_v1, supplements
        with minimal Postgres keyword fallback, hydrates rows from Postgres and returns
        checkable catalog item cards.
      operationId: searchCatalogItems
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CatalogSearchRequestIn'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogSearchResultOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /catalog/items/{id}:
    get:
      tags:
      - catalog
      summary: Get catalog item detail
      description: Returns a full price_item row with CSV import provenance.
      operationId: getCatalogItem
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceItemDetailOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /documents/upload:
    post:
      tags:
      - documents
      summary: Upload a document
      description: 'Stores the source file, creates a document in QUEUED status, and
        enqueues the explicit ingestion pipeline: process document, resolve contractor,
        then index chunks.'
      operationId: uploadDocument
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_uploadDocument'
        required: true
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadDocumentOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /documents/:
    get:
      tags:
      - documents
      summary: List documents
      description: Returns uploaded documents with status, contractor link, and preview
        availability.
      operationId: listDocuments
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: Offset
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/DocumentStatus'
          - type: 'null'
          title: Status
      - name: contractor_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Contractor Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DocumentOut'
                title: Response Listdocuments
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /documents/{id}/facts:
    get:
      tags:
      - documents
      summary: Get extracted document facts
      description: Returns LLM-extracted contract fields, summary, key points, and
        partial extraction state.
      operationId: getDocumentFacts
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentFactsOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - documents
      summary: Update extracted document facts
      description: Replaces editable extracted fields, summary, and key points for
        a document.
      operationId: updateDocumentFacts
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentFactsPatch'
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /documents/{id}/search:
    get:
      tags:
      - documents
      summary: Search inside a document
      description: Runs semantic search scoped to one document and returns matching
        chunks with page spans.
      operationId: searchWithinDocument
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Id
      - name: q
        in: query
        required: true
        schema:
          type: string
          title: Q
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 20
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WithinDocumentResultOut'
                title: Response Searchwithindocument
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /documents/{id}/answer:
    post:
      tags:
      - documents
      summary: Answer a question about one document
      description: Builds a RAG answer from chunks and facts scoped to the selected
        document.
      operationId: answerDocumentQuestion
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RagAnswerRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RagAnswerOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /documents/{id}/preview:
    get:
      tags:
      - documents
      summary: Download document preview
      description: Returns the stored PDF preview when one is available for the document.
      operationId: getDocumentPreview
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Id
      responses:
        '200':
          description: PDF preview stream.
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '404':
          description: Document or preview was not found.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /documents/{id}:
    delete:
      tags:
      - documents
      summary: Delete a document
      description: Deletes document metadata and removes its vectors from the Qdrant
        collection.
      operationId: deleteDocument
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - documents
      summary: Get document metadata
      description: Returns one document by id, including lifecycle status and contractor
        resolution result.
      operationId: getDocument
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /contractors/:
    get:
      tags:
      - contractors
      summary: List contractors
      description: Returns resolved contractor entities with document counts and optional
        name search.
      operationId: listContractors
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: Offset
      - name: q
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Q
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContractorCatalogItemOut'
                title: Response Listcontractors
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /contractors/{id}:
    get:
      tags:
      - contractors
      summary: Get contractor profile
      description: Returns contractor metadata plus counts for linked documents and
        raw name mappings.
      operationId: getContractor
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractorProfileOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /contractors/{id}/documents:
    get:
      tags:
      - contractors
      summary: List contractor documents
      description: Returns documents linked to one resolved contractor entity.
      operationId: listContractorDocuments
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Id
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 20
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DocumentOut'
                title: Response Listcontractordocuments
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /contractors/{id}/search:
    get:
      tags:
      - contractors
      summary: Search contractor documents
      description: Runs semantic search across documents for one contractor and groups
        matches by document.
      operationId: searchContractorDocuments
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Id
      - name: q
        in: query
        required: true
        schema:
          type: string
          title: Q
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 20
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DocumentSearchResultOut'
                title: Response Searchcontractordocuments
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /contractors/{id}/answer:
    post:
      tags:
      - contractors
      summary: Answer a question about one contractor
      description: Builds a RAG answer from documents linked to the selected contractor.
      operationId: answerContractorQuestion
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RagAnswerRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RagAnswerOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /search:
    get:
      tags:
      - search
      summary: Search contractors
      description: Runs global semantic search and aggregates matching chunks by contractor.
      operationId: searchContractors
      parameters:
      - name: q
        in: query
        required: true
        schema:
          type: string
          title: Q
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 20
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContractorSearchResultOut'
                title: Response Searchcontractors
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /search/answer:
    post:
      tags:
      - search
      summary: Answer a global search question
      description: Builds a RAG answer across all indexed documents and returns ranked
        contractors and sources.
      operationId: answerGlobalSearchQuestion
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RagAnswerRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalRagAnswerOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /documents/{id}/stream:
    get:
      tags:
      - documents
      summary: Stream document status
      description: Server-Sent Events stream for document lifecycle transitions. Events
        close after INDEXED or FAILED.
      operationId: streamDocumentStatus
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Id
      responses:
        '200':
          description: SSE stream with data events containing document_id, status,
            and optional error_message.
          content:
            text/event-stream:
              schema:
                type: string
              example: 'data: {"document_id":"...","status":"PROCESSING"}


                '
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    ActionPlanOut:
      properties:
        interface_mode:
          type: string
          enum:
          - brief_workspace
          - chat_search
          title: Interface Mode
        workflow_stage:
          type: string
          enum:
          - intake
          - clarifying
          - service_planning
          - supplier_searching
          - supplier_verification
          - brief_ready
          - brief_rendered
          - search_clarifying
          - searching
          - search_results_shown
          title: Workflow Stage
        tool_intents:
          items:
            type: string
          type: array
          title: Tool Intents
        search_requests:
          items:
            $ref: '#/components/schemas/SearchRequestOut'
          type: array
          title: Search Requests
        verification_targets:
          items:
            type: string
            format: uuid
          type: array
          title: Verification Targets
        render_requested:
          type: boolean
          title: Render Requested
        missing_fields:
          items:
            type: string
          type: array
          title: Missing Fields
        clarification_questions:
          items:
            type: string
          type: array
          title: Clarification Questions
        skipped_actions:
          items:
            type: string
          type: array
          title: Skipped Actions
      type: object
      required:
      - interface_mode
      - workflow_stage
      - tool_intents
      - search_requests
      - verification_targets
      - render_requested
      - missing_fields
      - clarification_questions
      - skipped_actions
      title: ActionPlanOut
    AssistantChatRequestIn:
      properties:
        session_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Session Id
        message:
          type: string
          title: Message
        brief:
          anyOf:
          - $ref: '#/components/schemas/BriefStateIn'
          - type: 'null'
        recent_turns:
          items:
            $ref: '#/components/schemas/ChatTurnIn'
          type: array
          title: Recent Turns
        visible_candidates:
          items:
            $ref: '#/components/schemas/VisibleCandidateIn'
          type: array
          title: Visible Candidates
        candidate_item_ids:
          items:
            type: string
            format: uuid
          type: array
          title: Candidate Item Ids
      type: object
      required:
      - message
      title: AssistantChatRequestIn
    AssistantChatResponseOut:
      properties:
        session_id:
          type: string
          format: uuid
          title: Session Id
        message:
          type: string
          title: Message
        ui_mode:
          type: string
          enum:
          - brief_workspace
          - chat_search
          title: Ui Mode
        router:
          $ref: '#/components/schemas/RouterDecisionOut'
        action_plan:
          anyOf:
          - $ref: '#/components/schemas/ActionPlanOut'
          - type: 'null'
        brief:
          $ref: '#/components/schemas/BriefStateOut'
        found_items:
          items:
            $ref: '#/components/schemas/FoundCatalogItemOut'
          type: array
          title: Found Items
        verification_results:
          items: {}
          type: array
          title: Verification Results
        rendered_brief:
          anyOf:
          - {}
          - type: 'null'
          title: Rendered Brief
      type: object
      required:
      - session_id
      - message
      - ui_mode
      - router
      - action_plan
      - brief
      - found_items
      - verification_results
      - rendered_brief
      title: AssistantChatResponseOut
    Body_importCatalogCsv:
      properties:
        file:
          type: string
          contentMediaType: application/octet-stream
          title: File
      type: object
      required:
      - file
      title: Body_importCatalogCsv
    Body_uploadDocument:
      properties:
        file:
          type: string
          contentMediaType: application/octet-stream
          title: File
        content_type:
          type: string
          title: Content Type
      type: object
      required:
      - file
      title: Body_uploadDocument
    BriefStateIn:
      properties:
        event_type:
          anyOf:
          - type: string
          - type: 'null'
          title: Event Type
        event_goal:
          anyOf:
          - type: string
          - type: 'null'
          title: Event Goal
        concept:
          anyOf:
          - type: string
          - type: 'null'
          title: Concept
        format:
          anyOf:
          - type: string
          - type: 'null'
          title: Format
        city:
          anyOf:
          - type: string
          - type: 'null'
          title: City
        date_or_period:
          anyOf:
          - type: string
          - type: 'null'
          title: Date Or Period
        audience_size:
          anyOf:
          - type: integer
          - type: 'null'
          title: Audience Size
        venue:
          anyOf:
          - type: string
          - type: 'null'
          title: Venue
        venue_status:
          anyOf:
          - type: string
          - type: 'null'
          title: Venue Status
        venue_constraints:
          items:
            type: string
          type: array
          title: Venue Constraints
        duration_or_time_window:
          anyOf:
          - type: string
          - type: 'null'
          title: Duration Or Time Window
        event_level:
          anyOf:
          - type: string
          - type: 'null'
          title: Event Level
        budget:
          anyOf:
          - type: string
          - type: integer
          - type: 'null'
          title: Budget
        budget_total:
          anyOf:
          - type: integer
          - type: 'null'
          title: Budget Total
        budget_per_guest:
          anyOf:
          - type: integer
          - type: 'null'
          title: Budget Per Guest
        budget_notes:
          anyOf:
          - type: string
          - type: 'null'
          title: Budget Notes
        catering_format:
          anyOf:
          - type: string
          - type: 'null'
          title: Catering Format
        technical_requirements:
          items:
            type: string
          type: array
          title: Technical Requirements
        service_needs:
          items:
            $ref: '#/components/schemas/ServiceNeedIn'
          type: array
          title: Service Needs
        required_services:
          items:
            type: string
          type: array
          title: Required Services
        must_have_services:
          items:
            type: string
          type: array
          title: Must Have Services
        nice_to_have_services:
          items:
            type: string
          type: array
          title: Nice To Have Services
        selected_item_ids:
          items:
            type: string
            format: uuid
          type: array
          title: Selected Item Ids
        constraints:
          items:
            type: string
          type: array
          title: Constraints
        preferences:
          items:
            type: string
          type: array
          title: Preferences
        open_questions:
          items:
            type: string
          type: array
          title: Open Questions
      type: object
      title: BriefStateIn
    BriefStateOut:
      properties:
        event_type:
          anyOf:
          - type: string
          - type: 'null'
          title: Event Type
        event_goal:
          anyOf:
          - type: string
          - type: 'null'
          title: Event Goal
        concept:
          anyOf:
          - type: string
          - type: 'null'
          title: Concept
        format:
          anyOf:
          - type: string
          - type: 'null'
          title: Format
        city:
          anyOf:
          - type: string
          - type: 'null'
          title: City
        date_or_period:
          anyOf:
          - type: string
          - type: 'null'
          title: Date Or Period
        audience_size:
          anyOf:
          - type: integer
          - type: 'null'
          title: Audience Size
        venue:
          anyOf:
          - type: string
          - type: 'null'
          title: Venue
        venue_status:
          anyOf:
          - type: string
          - type: 'null'
          title: Venue Status
        venue_constraints:
