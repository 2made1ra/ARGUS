[tool.uv.workspace]
members = ["backend", "packages/sage"]

[dependency-groups]
dev = [
    "pytest",
    "pytest-asyncio",
    "ruff",
]

[tool.pytest.ini_options]
addopts = "-ra"
asyncio_mode = "auto"
pythonpath = ["backend", "packages/sage"]
testpaths = ["backend/tests"]

[tool.ruff]
line-length = 88
target-version = "py313"
src = ["backend/app", "backend/tests", "packages/sage/sage"]

[tool.ruff.lint]
select = [
    "B",
    "E",
    "F",
    "I",
    "UP",
]

[tool.mypy]
python_version = "3.13"
strict = true
mypy_path = "packages/sage"

[[tool.mypy.overrides]]
module = [
    "fitz",
    "langchain_text_splitters",
    "PIL",
    "pytesseract",
]
ignore_missing_imports = true
