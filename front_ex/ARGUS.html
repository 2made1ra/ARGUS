<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARGUS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script>
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "mood": "ocean",
      "density": "balanced",
      "orbEnergy": "high"
    }/*EDITMODE-END*/;
  </script>
  <style>
    /* ─── RESET ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; overflow: hidden; }

    /* ─── DESIGN TOKENS — LIQUID CHROME ─────────────────────── */
    :root {
      /* Surfaces */
      --surface-shell:   #0f0e16;
      --surface-sidebar: #0a0910;
      --surface-main:    #121120;
      --surface-card:    #1a192a;
      --surface-soft:    #14131f;

      /* Borders */
      --border:        rgba(200,198,235,.09);
      --border-soft:   rgba(200,198,235,.05);
      --border-accent: rgba(230,228,255,.18);

      /* Text */
      --ink:    #f0eeff;
      --ink2:   #bab8dc;
      --muted:  #6d6b8a;
      --subtle: #3a3850;

      /* Chrome scale */
      --p50:  #2a284a;
      --p100: #38365a;
      --p200: #4a4870;
      --p300: #6a68a0;
      --p400: #9896c8;
      --p500: #bab8dc;
      --p600: #d8d6f0;
      --p700: #f0eeff;

      /* Shadows */
      --sh-shell:  0 32px 80px rgba(0,0,0,.55);
      --sh-card:   0 8px 24px rgba(0,0,0,.28);
      --sh-panel:  0 18px 50px rgba(0,0,0,.38);
      --sh-accent: 0 8px 22px rgba(190,188,220,.10);

      /* Radii */
      --r-xs:  8px;
      --r-sm:  12px;
      --r-md:  16px;
      --r-lg:  20px;
      --r-xl:  24px;
      --r-2xl: 32px;

      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: 13px;
    }

    /* Mood palette overrides */
    body[data-mood="ethereal"] {
      /* Default chrome — no override */
    }
    body[data-mood="ocean"] {
      --surface-shell:   #0a1520;
      --surface-sidebar: #050d18;
      --surface-main:    #0f1828;
      --surface-card:    #162335;
      --surface-soft:    #0d1a28;
      --p50:  #1a2a40; --p100: #254060;
      --p200: #2f5080; --p300: #4070b0;
      --p400: #7090d8; --p500: #a0b8f0;
      --p600: #c8dff8; --p700: #e8f4ff;
      --border-accent: rgba(120,170,230,.20);
    }
    body[data-mood="forest"] {
      --surface-shell:   #0a1410;
      --surface-sidebar: #050d0a;
      --surface-main:    #0f1814;
      --surface-card:    #162520;
      --surface-soft:    #0d1a14;
      --p50:  #1a3028; --p100: #254040;
      --p200: #2f6050; --p300: #408070;
      --p400: #70a888; --p500: #a0d0b0;
      --p600: #c8e8d0; --p700: #e8f8f0;
      --border-accent: rgba(100,180,140,.20);
    }

    /* Density overrides */
    body[data-density="compact"] {
      --r-xs:  6px; --r-sm:  8px; --r-md:  10px;
      --r-lg:  12px; --r-xl:  16px;
      font-size: 12px;
    }
    body[data-density="spacious"] {
      --r-xs:  10px; --r-sm:  14px; --r-md:  18px;
      --r-lg:  24px; --r-xl:  28px;
      font-size: 14px;
    }

    /* ─── BODY + ROOT SHELL ──────────────────────────────────── */
    body {
      height: 100%; overflow: hidden;
      display: flex; padding: 10px;
      background:
        radial-gradient(ellipse at 8% 35%,   rgba(130,160,200,.38) 0%, transparent 35%),
        radial-gradient(ellipse at 92% 65%,  rgba(170,140,200,.28) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 50%,  rgba(60,50,100,.45) 0%, transparent 50%),
        linear-gradient(125deg, #2a3a50 0%, #0f0e16 45%, #2a1e48 100%);
    }
    #root {
      flex: 1; position: relative;
      border-radius: var(--r-xl); overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,.72), inset 0 1px 2px rgba(230,228,255,.08);
      background: linear-gradient(135deg, rgba(15,14,22,.92) 0%, rgba(18,17,32,.88) 100%);
      backdrop-filter: blur(8px);
    }

    button  { border: none; background: none; cursor: pointer; font: inherit; color: inherit; }
    input, textarea { font: inherit; color: inherit; background: none; border: none; outline: none; }
    a { text-decoration: none; color: inherit; }

    /* ─── ANIMATED BG BLOBS (chrome shimmer) ────────────────── */
    .bg-layer {
      position: absolute; inset: 0; z-index: 0;
      pointer-events: none; overflow: hidden;
    }
    .blob { position: absolute; border-radius: 50%; filter: blur(90px); will-change: transform; }
    .blob-1 {
      width: 680px; height: 680px; top: -220px; right: -100px;
      background: radial-gradient(circle, rgba(140,165,200,.22) 0%, transparent 65%);
    }
    .blob-2 {
      width: 580px; height: 580px; bottom: -180px; left: -80px;
      background: radial-gradient(circle, rgba(180,140,200,.19) 0%, transparent 65%);
    }
    .blob-3 {
      width: 420px; height: 420px; top: 36%; right: 22%;
      background: radial-gradient(circle, rgba(140,120,180,.14) 0%, transparent 65%);
    }

    /* ─── APP GRID ──────────────────────────────────────────── */
    .app {
      position: relative; z-index: 1;
      display: grid; grid-template-columns: 256px 1fr;
      height: 100%;
    }

    /* ─── SIDEBAR ───────────────────────────────────────────── */
    .sidebar {
      background: var(--surface-sidebar);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      height: 100%; overflow: hidden;
    }
    .s-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 16px 12px; flex-shrink: 0;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-mark {
      width: 32px; height: 32px; border-radius: var(--r-xs); flex-shrink: 0;
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,.72) 0%, rgba(168,172,210,.38) 52%, rgba(92,98,142,.28) 100%);
      border: 1px solid rgba(200,200,235,.10);
      box-shadow: 0 0 14px rgba(178,178,220,.08), inset 2px 2px 6px rgba(255,255,255,.14);
      display: flex; align-items: center; justify-content: center;
    }
    .brand-name { font-size: 15px; font-weight: 700; letter-spacing: .04em; color: var(--ink); }
    .icon-btn {
      width: 32px; height: 32px; border-radius: var(--r-xs);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); transition: background .14s, color .14s;
    }
    .icon-btn:hover { background: rgba(255,255,255,.07); color: var(--ink); }

    .s-nav {
      display: flex; flex-direction: column; gap: 1px;
      padding: 2px 10px 8px; flex-shrink: 0;
    }
    .nav-link {
      display: flex; align-items: center; gap: 10px;
      padding: 0 12px; height: 40px; border-radius: var(--r-sm);
      font-size: 14px; font-weight: 500; color: var(--ink2);
      text-align: left; width: 100%;
      transition: background .12s, color .12s;
    }
    .nav-link:hover  { background: rgba(255,255,255,.06); color: var(--ink); }
    .nav-link.active { background: rgba(255,255,255,.08); color: var(--ink); font-weight: 600; }
    .nav-icon {
      width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; color: var(--muted);
    }
    .nav-link.active .nav-icon { color: var(--p500); }
    .nav-label { flex: 1; }

    /* ─── ЕДИНЫЙ СКРОЛЛ (избранное + история) ───────────────── */
    .s-scroll {
      flex: 1; overflow-y: auto; min-height: 0;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }

    /* ─── PINNED SECTION ────────────────────────────────────── */
    .s-pinned-label {
      font-size: 11px; font-weight: 700; color: var(--subtle);
      text-transform: uppercase; letter-spacing: .08em; padding: 12px 10px 8px;
    }
    .s-pinned {
      display: flex; flex-direction: column; gap: 1px;
      padding: 0 10px 8px;
    }
    .pinned-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: var(--r-xs);
      font-size: 13px; color: var(--ink2);
      text-align: left; width: 100%;
      transition: background .12s, color .12s;
      justify-content: space-between;
    }
    .pinned-item:hover  { background: rgba(255,255,255,.06); color: var(--ink); }
    .pinned-item.active { background: rgba(255,255,255,.08); color: var(--ink); font-weight: 600; }
    .pinned-icon {
      width: 16px; height: 16px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; color: var(--muted);
    }
    .pinned-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pinned-shortcut {
      font-size: 10px; color: var(--muted); flex-shrink: 0;
      white-space: nowrap;
    }

    .s-divider { height: 1px; background: rgba(255,255,255,.06); margin: 4px 12px 8px; flex-shrink: 0; }

    /* ─── SEARCH MODAL ──────────────────────────────────────── */
    .search-modal-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,.62);
      backdrop-filter: blur(4px);
      display: flex; align-items: flex-start; justify-content: center;
      padding-top: 60px;
      animation: fadeIn .2s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .search-modal {
      width: 90%; max-width: 520px;
      background: var(--surface-main);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      overflow: hidden; animation: slideUp .25s ease-out;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
    .search-modal-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      background: var(--surface-sidebar);
    }
    .search-modal-input {
      flex: 1; font-size: 16px; color: var(--ink);
      padding: 6px 0; background: none; border: none; outline: none;
    }
    .search-modal-input::placeholder { color: var(--muted); }
    .search-modal-close {
      width: 32px; height: 32px; border-radius: var(--r-xs);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); flex-shrink: 0;
      transition: background .12s, color .12s;
    }
    .search-modal-close:hover { background: var(--p50); color: var(--ink); }
    .search-modal-results {
      max-height: 400px; overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .search-empty {
      padding: 40px 20px; text-align: center;
      color: var(--muted); font-size: 14px;
    }
    .search-result-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 20px; width: 100%;
      border: none; background: none;
      border-bottom: 1px solid var(--border-soft);
      text-align: left; cursor: pointer;
      transition: background .12s;
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: var(--surface-soft); }
    .search-result-text { flex: 1; min-width: 0; }
    .search-result-title { font-size: 13.5px; font-weight: 500; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .search-result-period { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .s-hist {
      padding: 0 10px;
      display: flex; flex-direction: column;
    }
    .hist-group { margin-bottom: 6px; }
    .hist-label {
      display: block; font-size: 10px; font-weight: 700; color: var(--subtle);
      text-transform: uppercase; letter-spacing: .08em; padding: 8px 10px 4px;
    }
    .hist-item {
      display: block; width: 100%; text-align: left;
      padding: 6px 10px; border-radius: var(--r-xs);
      font-size: 13px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: background .12s, color .12s;
    }
    .hist-item:hover  { background: rgba(255,255,255,.06); color: var(--ink); }
    .hist-item.active { background: rgba(255,255,255,.08); color: var(--ink); font-weight: 600; }

    .s-user {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; border-top: 1px solid rgba(255,255,255,.06); flex-shrink: 0;
    }
    .u-avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,.32) 0%, var(--p400) 50%, var(--p300) 100%);
      color: var(--ink); font-size: 11.5px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 2px rgba(178,175,215,.12), var(--sh-accent);
    }
    .u-info { flex: 1; min-width: 0; }
    .u-name  { font-size: 13.5px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .u-email { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ─── MAIN PANEL ────────────────────────────────────────── */
    .main {
      display: flex; flex-direction: column;
      background: var(--surface-main);
      height: 100%; overflow: hidden;
    }

    .m-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .m-hdr-l, .m-hdr-r { display: flex; align-items: center; gap: 6px; }
    .model-pill {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 12px; border: 1px solid var(--border);
      border-radius: var(--r-sm); font-size: 13px; font-weight: 600;
      background: linear-gradient(135deg, rgba(26,25,42,.6) 0%, rgba(20,19,30,.6) 100%);
      color: var(--ink); cursor: pointer;
      backdrop-filter: blur(8px);
      transition: border-color .14s, box-shadow .14s;
    }
    .model-pill:hover {
      border-color: var(--border-accent);
      box-shadow: 0 0 0 3px rgba(230,228,255,.12);
      background: linear-gradient(135deg, rgba(32,30,50,.75) 0%, rgba(26,25,42,.75) 100%);
    }
    .model-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--p600); }
    .h-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 12px; border-radius: var(--r-sm);
      font-size: 12.5px; font-weight: 600; color: var(--muted);
      border: 1px solid var(--border);
      background: transparent;
      transition: background .14s, color .14s, border-color .14s;
    }
    .h-btn:hover        { background: rgba(200,198,235,.08); color: var(--ink); border-color: var(--border-accent); }
    .h-btn.primary      { background: var(--p600); color: var(--surface-shell); border-color: var(--p600); }
    .h-btn.primary:hover { background: var(--p700); border-color: var(--p700); }
    .h-ico-btn {
      width: 34px; height: 34px; border-radius: var(--r-xs);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); border: 1px solid transparent;
      transition: background .14s, color .14s, border-color .14s;
    }
    .h-ico-btn:hover { background: var(--p50); color: var(--ink); border-color: var(--border); }

    /* ─── ORB ───────────────────────────────────────────────── */
    .orb-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
    .orb-canvas { display: block; }
    .orb-dots {
      position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 5px; align-items: center;
    }
    .orb-dots span {
      width: 5px; height: 5px; border-radius: 50%; background: var(--p400);
      animation: dotPulse 1.2s ease-in-out infinite;
    }
    .orb-dots span:nth-child(2) { animation-delay: .18s; }
    .orb-dots span:nth-child(3) { animation-delay: .36s; }
    @keyframes dotPulse {
      0%,80%,100% { transform: scale(.5); opacity: .3; }
      40% { transform: scale(1.05); opacity: 1; }
    }

    /* ─── EMPTY STATE ───────────────────────────────────────── */
    .empty-area {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; overflow-y: auto; padding-top: 38px;
    }
    .greeting-name {
      font-size: 42px; font-weight: 700; text-align: center;
      color: var(--p500); letter-spacing: -0.04em; line-height: 1.08;
      margin: 0 0 4px;
    }
    .greeting-q {
      font-size: 36px; font-weight: 700; color: var(--ink);
      text-align: center; margin-bottom: 30px;
      letter-spacing: -0.03em; line-height: 1.1;
    }

    /* ─── CHAT ──────────────────────────────────────────────── */
    .chat-area {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
      animation: fadeUp .32s ease-out;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .chat-thread {
      flex: 1; overflow-y: auto; padding: 24px 32px;
      display: flex; flex-direction: column; gap: 18px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .msg { display: flex; flex-direction: column; gap: 4px; animation: msgIn .27s ease-out; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .msg-user { align-items: flex-end; }
    .msg-asst { align-items: flex-start; }
    .msg-role {
      font-size: 10.5px; font-weight: 700; letter-spacing: .06em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 3px;
    }
    .msg-user .msg-role { color: var(--p500); }
    .msg-bubble {
      max-width: 72%; padding: 12px 16px; border-radius: var(--r-lg);
      font-size: 14px; line-height: 1.65;
      white-space: pre-wrap; overflow-wrap: anywhere;
    }
    .msg-user .msg-bubble {
      background: var(--p300); color: var(--ink);
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 16px rgba(0,0,0,.28);
    }
    .msg-asst .msg-bubble {
      background: var(--surface-card); border: 1px solid var(--border);
      color: var(--ink2); border-bottom-left-radius: 4px;
      box-shadow: var(--sh-card);
    }
    .typing {
      display: flex; align-items: center; gap: 5px;
      padding: 13px 16px; background: var(--surface-card);
      border: 1px solid var(--border); border-radius: var(--r-lg);
      border-bottom-left-radius: 4px; width: fit-content;
      box-shadow: var(--sh-card);
    }
    .typing span {
      width: 6px; height: 6px; background: var(--p400);
      border-radius: 50%; animation: typeDot 1.2s ease-in-out infinite;
    }
    .typing span:nth-child(2) { animation-delay: .18s; }
    .typing span:nth-child(3) { animation-delay: .36s; }
    @keyframes typeDot {
      0%,80%,100% { transform: translateY(0); opacity: .4; }
      40%          { transform: translateY(-5px); opacity: 1; }
    }

    /* ─── COMPOSER ──────────────────────────────────────────── */
    .composer-wrap {
      padding: 0 24px 20px; max-width: 820px;
      width: 100%; margin: 0 auto; flex-shrink: 0;
    }
    .composer-box {
      background: var(--surface-card);
      border: 1px solid var(--border-accent);
      border-radius: var(--r-xl); overflow: hidden;
      box-shadow: 0 12px 32px rgba(0,0,0,.28), 0 0 0 4px rgba(178,175,215,.05);
      transition: box-shadow .2s, border-color .2s;
    }
    .composer-box:focus-within {
      box-shadow: 0 16px 40px rgba(0,0,0,.32), 0 0 0 4px rgba(178,175,215,.12);
      border-color: var(--p300);
    }
    .composer-row {
      display: flex; align-items: flex-end; gap: 0;
    }
    .composer-ta {
      flex: 1; padding: 18px 16px 18px 20px;
      font-size: 14.5px; line-height: 1.6; color: var(--ink);
      min-height: 60px; max-height: 180px;
      overflow-y: auto; display: block; resize: none;
    }
    .composer-ta::placeholder { color: var(--subtle); }
    .composer-send-wrap {
      display: flex; align-items: center;
      padding: 0 14px 0 8px; flex-shrink: 0; align-self: center;
    }
    .c-pill {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 12px; border-radius: var(--r-sm);
      font-size: 12.5px; font-weight: 600;
      border: 1px solid transparent;
      transition: background .13s, color .13s, border-color .13s;
      white-space: nowrap;
    }
    .c-pill.lavender {
      background: var(--surface-soft); color: var(--p500);
      border-color: var(--p300);
    }
    .c-pill.lavender:hover { background: var(--p100); border-color: var(--p400); }
    .c-pill.ghost { color: var(--muted); }
    .c-pill.ghost:hover { background: var(--p50); color: var(--ink); }
    .c-spacer { flex: 1; }
    .c-ico {
      width: 32px; height: 32px; border-radius: var(--r-xs);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); transition: background .13s, color .13s;
    }
    .c-ico:hover { background: var(--p100); color: var(--ink); }
    .send-btn {
      width: 36px; height: 36px; border-radius: var(--r-sm);
      background: linear-gradient(135deg, var(--p600) 0%, var(--p500) 100%);
      color: #0f0e16;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 20px rgba(216,214,240,.24);
      transition: background .13s, transform .1s, opacity .13s, box-shadow .13s;
    }
    .send-btn:hover:not(:disabled)  { background: linear-gradient(135deg, var(--p700) 0%, var(--p600) 100%); box-shadow: 0 8px 28px rgba(216,214,240,.36); }
    .send-btn:active:not(:disabled) { transform: scale(.92); }
    .send-btn:disabled { opacity: .3; cursor: default; box-shadow: none; }

    /* ─── MODE BAR ──────────────────────────────────────────── */
    .mode-bar {
      display: flex; align-items: center; gap: 4px;
      padding: 8px 4px 2px;
    }
    .mode-tab {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: var(--r-sm);
      font-size: 12.5px; font-weight: 500; color: var(--muted);
      border: 1px solid transparent;
      transition: background .14s, color .14s, border-color .14s;
      white-space: nowrap;
    }
    .mode-tab:hover {
      background: var(--p50); color: var(--ink2);
      border-color: var(--border);
    }
    .mode-tab-active {
      background: var(--p100); color: var(--p600);
      border-color: var(--p300); font-weight: 600;
    }
    .mode-tab-active .mode-tab-icon { color: var(--p500); }
    .mode-tab-icon {
      display: flex; align-items: center; color: var(--subtle);
      transition: color .14s;
    }
    .mode-tab-label { line-height: 1; }

    /* ─── QUICK ACTIONS ─────────────────────────────────────── */
    .quick-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; max-width: 820px; width: 100%;
      margin: 0 auto 24px; padding: 0 24px;
    }
    .q-card {
      display: flex; flex-direction: column; gap: 6px;
      padding: 18px; border-radius: var(--r-lg);
      text-align: left; background: linear-gradient(135deg, rgba(26,25,42,.65) 0%, rgba(20,19,30,.65) 100%);
      border: 1px solid var(--border);
      box-shadow: 0 8px 24px rgba(0,0,0,.32);
      backdrop-filter: blur(8px);
      transition: box-shadow .15s, border-color .15s, transform .15s;
      color: inherit;
    }
    .q-card:hover {
      border-color: var(--border-accent);
      background: linear-gradient(135deg, rgba(32,30,50,.80) 0%, rgba(26,25,42,.80) 100%);
      box-shadow: 0 16px 40px rgba(0,0,0,.42);
      transform: translateY(-2px);
    }
    .q-icon { margin-bottom: 2px; color: var(--p500); }
    .q-title { font-size: 13.5px; font-weight: 700; color: var(--ink); }
    .q-desc  { font-size: 12px; color: var(--muted); line-height: 1.5; }

    /* ─── FOOTER ────────────────────────────────────────────── */
    .m-footer {
      font-size: 11.5px; color: var(--subtle);
      text-align: center; padding: 8px; flex-shrink: 0;
    }
    .m-footer a { color: var(--p500); }
    .m-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="argus-components.jsx"></script>
  <script type="text/babel" src="argus-app.jsx"></script>
  <script type="text/babel">
    const { TweaksPanel, useTweaks, TweakSection, TweakRadio } = window;

    function ArgusTweaks() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      // Apply tweaks to body
      React.useEffect(() => {
        document.body.setAttribute('data-mood', t.mood);
        document.body.setAttribute('data-density', t.density);
        // orbEnergy will be read by ArgusOrb component
        window.ARGUS_ORB_ENERGY = t.orbEnergy;
      }, [t.mood, t.density, t.orbEnergy]);

      return (
        <TweaksPanel>
          <TweakSection label="Mood">
            <TweakRadio
              value={t.mood}
              onChange={v => setTweak('mood', v)}
              options={[
                { value: 'ethereal', label: 'Ethereal' },
                { value: 'ocean', label: 'Ocean' },
                { value: 'forest', label: 'Forest' }
              ]}
            />
          </TweakSection>

          <TweakSection label="Density">
            <TweakRadio
              value={t.density}
              onChange={v => setTweak('density', v)}
              options={[
                { value: 'compact', label: 'Compact' },
                { value: 'balanced', label: 'Balanced' },
                { value: 'spacious', label: 'Spacious' }
              ]}
            />
          </TweakSection>

          <TweakSection label="Orb Energy">
            <TweakRadio
              value={t.orbEnergy}
              onChange={v => setTweak('orbEnergy', v)}
              options={[
                { value: 'low', label: 'Low' },
                { value: 'medium', label: 'Medium' },
                { value: 'high', label: 'High' }
              ]}
            />
          </TweakSection>
        </TweaksPanel>
      );
    }

    // Mount tweaks panel
    const tweaksRoot = document.createElement('div');
    document.body.appendChild(tweaksRoot);
    ReactDOM.createRoot(tweaksRoot).render(<ArgusTweaks />);
  </script>
</body>
</html>
